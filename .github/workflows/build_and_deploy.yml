name: "Jellyfin-newsletter docker image deployment"

permissions:
  contents: write
  packages: write
  pull-requests: write

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-dev.[0-9]+"

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      is_prod: ${{ steps.check_env.outputs.is_prod }}
      is_dev: ${{ steps.check_env.outputs.is_dev }}
      environment: ${{ steps.check_env.outputs.environment }}
    steps:
      - name: Determine environment
        id: check_env
        run: |
          TAG="${{ github.ref_name }}"
          if [[ $TAG =~ ^v[0-9]+\.[0-9]+\.[0-9]+-dev\.[0-9]+$ ]]; then
            echo "is_dev=true" >> $GITHUB_OUTPUT
            echo "is_prod=false" >> $GITHUB_OUTPUT
            echo "environment=development" >> $GITHUB_OUTPUT
          elif [[ $TAG =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_dev=false" >> $GITHUB_OUTPUT
            echo "is_prod=true" >> $GITHUB_OUTPUT
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "is_dev=false" >> $GITHUB_OUTPUT
            echo "is_prod=false" >> $GITHUB_OUTPUT
            echo "environment=unknown" >> $GITHUB_OUTPUT
          fi
      - name: Fail if not prod or dev tag
        if: ${{ steps.check_env.outputs.is_prod != 'true' && steps.check_env.outputs.is_dev != 'true' }}
        run: |
          echo "This workflow only runs on production or development tags."
          exit 1
  code_and_security_tests:
    needs: setup
    uses: ./.github/workflows/go_code_scan_test.yml

  build_and_publish:
    needs: [code_and_security_tests]
    name: Build and publish image
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    env:
      DOCKER_IMAGE_NAME: "jellyfin-newsletter"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract env variables
        id: vars
        run: |
          echo "GIT_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "CURRENT_VERSION=$(echo ${{ github.ref_name }} | sed 's/\([0-9]*\.[0-9]*\.[0-9]*\).*/\1/')" >> $GITHUB_ENV
          echo "CURRENT_SHORT_VERSION=$(echo ${{ github.ref_name }} | sed 's/\([0-9]*\.[0-9]*\).*$/\1/')" >> $GITHUB_ENV
          echo "REPOSITORY_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "DATE=$(date)" >> $GITHUB_ENV
          platform=${{ matrix.os == 'ubuntu-24.04' && 'linux/amd64' || 'linux/arm64' }}
          arch=${{ matrix.os == 'ubuntu-24.04' && 'amd64' || 'arm64' }}
          echo "PLATFORM=${platform}" >> $GITHUB_ENV
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Set up Qemu
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: engine-go/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPOSITORY_NAME }}
          build-args: |
            VERSION=${{ github.ref_name }}
          labels: |
            org.opencontainers.image.revision=${{ env.GIT_COMMIT }}
            org.opencontainers.image.created=${{ env.DATE }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.title="Jellyfin Newsletter"
            org.opencontainers.image.description="A Dockerized newsletter service that connects to Jellyfin  API to notify your users of newly added media."
            org.opencontainers.image.authors="Seaweedbrain github.com/SeaweedbrainCY"
            org.opencontainers.image.url="https://github.com/seaweedbraincy/jellyfin-newsletter"
            org.opencontainers.image.source="https://github.com/seaweedbraincy/jellyfin-newsletter"
            org.opencontainers.image.licenses="AGPL-3.0-or-later"
            org.opencontainers.image.documentation="https://github.com/seaweedbraincy/jellyfin-newsletter#readme"
            org.opencontainers.image.vendor="Seaweedbrain"
            org.opencontainers.image.base.name="gcr.io/distroless/static"
          annotations: |
            org.opencontainers.image.description="A Dockerized newsletter service that connects to Jellyfin  API to notify your users of newly added media."
            org.opencontainers.image.source=https://github.com/seaweedbraincy/jellyfin-newsletter
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: ${{ env.PLATFORM }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-manifests:
    runs-on: ubuntu-latest
    needs:
      - build_and_publish
    steps:
      - name: Extract Git commit
        id: vars
        run: |
          echo "GIT_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "REPOSITORY_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta (dev)
        id: meta-dev
        uses: docker/metadata-action@v5
        if: needs.setup.outputs.id_dev == 'true'
        with:
          images: ghcr.io/${{ env.REPOSITORY_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=dev
          annotations: |
            org.opencontainers.image.description="A Dockerized newsletter service that connects to Jellyfin  API to notify your users of newly added media."
            org.opencontainers.image.source=https://github.com/seaweedbraincy/jellyfin-newsletter

      - name: Docker meta (prod)
        id: meta-prod
        uses: docker/metadata-action@v5
        if: needs.setup.outputs.is_prod == 'true'
        with:
          images: ghcr.io/${{ env.REPOSITORY_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
          annotations: |
            org.opencontainers.image.description="A Dockerized newsletter service that connects to Jellyfin  API to notify your users of newly added media."
            org.opencontainers.image.source=https://github.com/seaweedbraincy/jellyfin-newsletter

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<<   "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ env.REPOSITORY_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ghcr.io/${{ env.REPOSITORY_NAME }}:${{ needs.setup.outputs.is_dev == 'true' && steps.meta-dev.outputs.version || steps.meta-prod.outputs.version }}
