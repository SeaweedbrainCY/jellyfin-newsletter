# This is a test config file
# TMDB API key and jellyfin api token should be omitted by VCR so their value is irrelevant (only if you need to record again the cassette)
#

jellyfin:
  url: "http://localhost:8096"
  api_token: "faketoken"
  watched_film_folders:
    - "movies"
  watched_tv_folders:
    - "tvshows"

  observed_period_days: 30

tmdb:
  api_key: "eyJhbGciOiJIUzI1NiJ9.test-payload.fake-sig"

email_template:
  language: "en"
  subject: "[Jellyfin] New movies ans TV shows of {{.MonthName}}"
  title: " New movies ans TV shows since {.StartMonthName}} {{.StartYear}}"
  subtitle: "Summary of the new Movies and TV shows added between {{.StartDate}} and {{.Date}}."
  jellyfin_url: "https://netflix.example.com"
  unsubscribe_email: "unsubscribe@example.com"
  jellyfin_owner_name: "TestJellyfinUser"

email:
  smtp_server: "smtp.example.com"
  smtp_port: 465
  smtp_sender_email: "Jellyfin <jellyfin@notifications.example.com>"
  smtp_tls_type: "NONE"

recipients:
  - "testuser@example.com"
